on:
  push:
    branches:
      - main
    paths:
      - 'v2/**'
  pull_request:
    paths:
      - 'v2/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: Test v2
jobs:
  test-nocache:
    if: "!startsWith(github.ref, 'refs/tags/')"
    strategy:
      matrix:
        go-version: [1.25.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
          cache: false
      - name: pull docker image
        run: docker pull docker.elastic.co/elasticsearch/elasticsearch:8.10.2
      - run: go test -p 1 ./...
        working-directory: v2
  lint:
    name: Lint v2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25.x
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.6
          working-directory: v2
  check-openapi:
    name: Check OpenAPI spec is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: 1.25.x
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
      - name: Install protoc-gen-openapi
        run: go install github.com/google/gnostic/cmd/protoc-gen-openapi@latest
      - name: Regenerate OpenAPI spec
        working-directory: v2
        run: make openapi-v3-gen
      - name: Check for differences
        run: |
          if ! git diff --exit-code v2/api/archive-query-service/v2/query_services.openapi.yaml; then
            echo "::error::OpenAPI spec is out of date. Run 'make openapi-v3-gen' and commit the result."
            exit 1
          fi
  govulncheck:
    runs-on: ubuntu-latest
    name: Run govulncheck v2
    steps:
      - id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.25' # Change this to your project's Go version
          go-package: ./...
          work-dir: v2